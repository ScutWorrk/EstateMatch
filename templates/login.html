<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estate Match - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .login-header {
            background-color: #313182; /* Estate Match Brand Blue */
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-card bg-white">
    <div class="login-header">
        <h2 class="fw-bold mb-0">🏠 Estate Match</h2>
        <p class="mb-0 mt-2 text-white-50">Decision Support System</p>
    </div>
    
    <div class="p-4 p-md-5">
        <h5 class="mb-4 text-center text-muted">Sign In to Your Account</h5>
        
        {% if error %}
        <div class="alert alert-danger text-center py-2" role="alert">
            <small>{{ error }}</small>
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label fw-bold text-muted small">USERNAME</label>
                <input type="text" class="form-control form-control-lg" name="username" placeholder="e.g. agent_sarah" required autofocus>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold text-muted small">PASSWORD</label>
                <input type="password" class="form-control form-control-lg" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm" style="background-color: #313182; border: none;">Login</button>
        </form>
    </div>
</div>

</body>
</html>
